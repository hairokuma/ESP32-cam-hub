<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32-CAM Multi-Camera View</title>
  <link rel="stylesheet" href="/timeline.css">
</head>

<body>
  <a href="/" class="close-btn">&times;</a>
  <div class="media-container">
    <button class="nav-arrow nav-arrow-left" id="prevImage" title="Previous (←)">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>
    <button class="nav-arrow nav-arrow-right" id="nextImage" title="Next (→)">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </button>
  </div>
  <div class="timeline-container">
    <div class="time-scrubber" id="timeScrubber">
      <div class="scrubber-track" id="scrubberTrack">
        <div class="scrubber-bar" id="scrubberBar">
          <div class="scrubber-tooltip" id="scrubberTooltip">{{images[-2].timestamp if images|length > 1 else '00:00:00'}}</div>
        </div>
      </div>
      <div class="scrubber-labels">
        <span class="scrubber-label" id="scrubberStart">{{images[0].timestamp if images|length > 0 else '00:00:00'}}</span>
        <span class="scrubber-label scrubber-current" id="scrubberTime">{{images[-2].timestamp if images|length > 1 else '00:00:00'}}</span>
        <span class="scrubber-label" id="scrubberEnd">{{images[-2].timestamp if images|length > 1 else '00:00:00'}}</span>
      </div>
    </div>
    <div class="timeline" id="timeline" data-images="{{images | length}}">
      <!-- Timeline items will be rendered dynamically by JavaScript -->
    </div>
  </div>
  
  <!-- Pass images data to JavaScript -->
  <script>
    window.timelineImages = {{ images | tojson }};
  </script>
  <script src="/timeline.js"></script>
</body>

</html>
