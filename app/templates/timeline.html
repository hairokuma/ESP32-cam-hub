<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32-CAM Multi-Camera View</title>
  <link rel="stylesheet" href="/timeline.css">
</head>

<body>
  <a href="/" class="close-btn">&times;</a>
  <div class="media-container">
    <button class="nav-arrow nav-arrow-left" id="prevImage" title="Previous (←)">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>
    <button class="nav-arrow nav-arrow-right" id="nextImage" title="Next (→)">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </button>
  </div>
  <div class="timeline-container">
    <div class="time-scrubber" id="timeScrubber">
      <div class="batch-container">
        {% for batch in batches %}
        <a href="{{batch.url}}" class="batch-item" data-active="{{batch.active}}">
          {{ batch.name }}
        </a>
        {% endfor %}
      </div>
      <div class="scrubber-track" id="scrubberTrack">
        <div class="scrubber-bar" id="scrubberBar">
          <div class="scrubber-tooltip" id="scrubberTooltip">{{images[-2].timestamp}}</div>
        </div>
      </div>
      <div class="scrubber-labels">
        <span class="scrubber-label" id="scrubberStart">{{images[0].timestamp}}</span>
        <span class="scrubber-label scrubber-current" id="scrubberTime">{{images[-2].timestamp}}</span>
        <span class="scrubber-label" id="scrubberEnd">{{images[-2].timestamp}}</span>
      </div>
    </div>
    <div class="timeline" id="timeline" data-images="{{images | length}}">
      {% for image in images %}
      <div class="timeline-item" onclick="displayImage(parseInt('{{ loop.index0 }}'))" data-item="{{ loop.index0 }}"
        data-timestamp="{{ image.timestamp }}">
        <img
          src="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22300%22%3E%3Crect fill=%22%232a2a2a88%22 width=%22400%22 height=%22300%22/%3E%3C/svg%3E"
          data-src="{{ image.src }}" alt="Captured Image">
        <div class="timestamp">{{ image.timestamp }}</div>
      </div>
      {% endfor %}
    </div>
  </div>
</body>
<script src="/timeline.js"></script>

</html>
