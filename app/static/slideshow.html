initial-scale=1.0">    <meta charset="UTF-8"><head><html lang="en"><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slideshow - ESP32-CAM</title>
    <link rel="stylesheet" href="slideshow.css">
</head>
<body>
    <div class="header">
        <a href="/" class="back-button" title="Back to Main">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
        </a>
        <div class="header-info">
            <h1>Slideshow</h1>
            <span id="cameraId" class="camera-label">Camera: --</span>
            <span id="imageCounter" class="image-counter">0 / 0</span>
        </div>
    </div>

    <div class="slideshow-container">
        <div class="carousel" id="carousel">
            <!-- Carousel items will be dynamically inserted -->
        </div>

        <!-- Navigation Controls -->
        <button class="nav-button nav-prev" id="navPrev" title="Previous (←)">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
        <button class="nav-button nav-next" id="navNext" title="Next (→)">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </button>

        <!-- Loading indicator -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading images...</p>
        </div>

        <!-- Empty state -->
        <div class="empty-state" id="emptyState">
            <p>No images found for this camera</p>
            <a href="/" class="back-link">Return to Main</a>
        </div>
    </div>

    <!-- Image Info Overlay -->
    <div class="image-info" id="imageInfo">
        <span id="imageTimestamp">--.--.---- --:--:--</span>
    </div>

    <script src="slideshow.js"></script>
</body>
</html>
