<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slideshow - ESP32-CAM</title>
    <link rel="stylesheet" href="slideshow.css">
</head>
<body>
    <div class="header">
        <a href="/" class="back-arrow" title="Back to Main">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
        </a>
        <h1 id="cameraTitle">Image Slideshow</h1>
        <div class="stats">
            <span id="imageCounter">0 / 0</span>
            <span id="imageDate">--.--.---- --:--</span>
        </div>
    </div>

    <div class="slideshow-container" id="slideshowContainer">
        <div class="carousel-track" id="carouselTrack">
            <!-- Images will be dynamically inserted here -->
        </div>

        <button class="nav-btn nav-btn-left" id="btnPrev">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>

        <button class="nav-btn nav-btn-right" id="btnNext">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </button>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Loading images...</p>
    </div>

    <div class="no-images" id="noImages" style="display: none;">
        <p>No images available for this camera.</p>
        <a href="/" class="btn-back">Go Back</a>
    </div>

    <script src="slideshow.js"></script>
</body>
</html>
